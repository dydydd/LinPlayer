name: Build FFmpeg Extension

on:
  push:
    branches: [ main, master ]
    paths:
      - 'android/exoplayer-ffmpeg/**'
      - '.github/workflows/build-ffmpeg.yml'
  workflow_dispatch:
  schedule:
    # 姣忓懆涓€鍑屾櫒缂栬瘧涓€娆★紙淇濇寔渚濊禆鏈€鏂帮級
    - cron: '0 0 * * 1'

env:
  EXOPLAYER_VERSION: 1.3.1
  FFMPEG_VERSION: n6.0
  NDK_VERSION: r25c

jobs:
  build-ffmpeg:
    name: Build FFmpeg Extension AAR
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout LinPlayer code
        uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      
      # 涓嬭浇 Android NDK
      - name: Download Android NDK
        run: |
          wget -q https://dl.google.com/android/repository/android-ndk-${NDK_VERSION}-linux.zip -O /tmp/ndk.zip
          unzip -q /tmp/ndk.zip -d /opt
          echo "NDK_PATH=/opt/android-ndk-${NDK_VERSION}" >> $GITHUB_ENV
      
      # 涓嬭浇 ExoPlayer media3 婧愮爜
      - name: Download ExoPlayer source
        run: |
          git clone --depth 1 --branch ${{ env.EXOPLAYER_VERSION }} \
            https://github.com/androidx/media.git /tmp/media3
      
      # 涓嬭浇 FFmpeg 婧愮爜
      - name: Download FFmpeg source
        run: |
          git clone --depth 1 --branch ${{ env.FFMPEG_VERSION }} \
            https://git.ffmpeg.org/ffmpeg.git /tmp/media3/libraries/decoder_ffmpeg/src/main/jni/ffmpeg
      
      # 缂栬瘧 FFmpeg锛堟墍鏈夋灦鏋勫湪涓€涓?job 涓畬鎴愶級
      - name: Build FFmpeg for all architectures
        run: |
          FFMPEG_MODULE_PATH="/tmp/media3/libraries/decoder_ffmpeg/src/main"
          NDK_PATH="/opt/android-ndk-${NDK_VERSION}"
          HOST_PLATFORM="linux-x86_64"
          ANDROID_ABI="21"
          ENABLED_DECODERS=(pgssub dvbsub dvdsub ass ssa srt webvtt)
          JOBS=$(nproc)
          
          COMMON_OPTIONS="
              --target-os=android
              --enable-static
              --disable-shared
              --disable-doc
              --disable-programs
              --disable-everything
              --disable-avdevice
              --disable-avformat
              --disable-swscale
              --disable-postproc
              --disable-avfilter
              --disable-symver
              --enable-swresample
              --extra-ldexeflags=-pie
              --disable-v4l2-m2m
              --disable-vulkan
              --disable-asm
              "
          
          for decoder in "${ENABLED_DECODERS[@]}"; do
              COMMON_OPTIONS="${COMMON_OPTIONS} --enable-decoder=${decoder}"
          done
          
          TOOLCHAIN_PREFIX="${NDK_PATH}/toolchains/llvm/prebuilt/${HOST_PLATFORM}/bin"
          
          cd "${FFMPEG_MODULE_PATH}/jni/ffmpeg"
          
          # 缂栬瘧 arm64-v8a
          echo "Building for arm64-v8a..."
          ./configure \
              --libdir=android-libs/arm64-v8a \
              --arch=aarch64 \
              --cpu=armv8-a \
              --cross-prefix="${TOOLCHAIN_PREFIX}/aarch64-linux-android${ANDROID_ABI}-" \
              --nm="${TOOLCHAIN_PREFIX}/llvm-nm" \
              --ar="${TOOLCHAIN_PREFIX}/llvm-ar" \
              --ranlib="${TOOLCHAIN_PREFIX}/llvm-ranlib" \
              --strip="${TOOLCHAIN_PREFIX}/llvm-strip" \
              ${COMMON_OPTIONS}
          make -j${JOBS}
          
          # 鎵嬪姩澶嶅埗闈欐€佸簱鍒?CMake 鏈熸湜鐨勮矾寰?          mkdir -p android-libs/arm64-v8a
          cp libavutil/libavutil.a android-libs/arm64-v8a/
          cp libswresample/libswresample.a android-libs/arm64-v8a/
          cp libavcodec/libavcodec.a android-libs/arm64-v8a/
          
          echo "FFmpeg libraries for arm64-v8a:"
          ls -la android-libs/arm64-v8a/
          
          make clean
          
          # 缂栬瘧 armeabi-v7a
          echo "Building for armeabi-v7a..."
          ./configure \
              --libdir=android-libs/armeabi-v7a \
              --arch=arm \
              --cpu=armv7-a \
              --cross-prefix="${TOOLCHAIN_PREFIX}/armv7a-linux-androideabi${ANDROID_ABI}-" \
              --nm="${TOOLCHAIN_PREFIX}/llvm-nm" \
              --ar="${TOOLCHAIN_PREFIX}/llvm-ar" \
              --ranlib="${TOOLCHAIN_PREFIX}/llvm-ranlib" \
              --strip="${TOOLCHAIN_PREFIX}/llvm-strip" \
              --extra-cflags="-march=armv7-a -mfloat-abi=softfp" \
              --extra-ldflags="-Wl,--fix-cortex-a8" \
              ${COMMON_OPTIONS}
          make -j${JOBS}
          
          # 鎵嬪姩澶嶅埗闈欐€佸簱鍒?CMake 鏈熸湜鐨勮矾寰?          mkdir -p android-libs/armeabi-v7a
          cp libavutil/libavutil.a android-libs/armeabi-v7a/
          cp libswresample/libswresample.a android-libs/armeabi-v7a/
          cp libavcodec/libavcodec.a android-libs/armeabi-v7a/
          
          echo "FFmpeg libraries for armeabi-v7a:"
          ls -la android-libs/armeabi-v7a/
          
          make clean
          
          make clean
      
      # 璋冭瘯锛氭鏌?NDK 涓彲鐢ㄧ殑缂栬瘧鍣?      - name: Debug NDK compilers
        run: |
          echo "Available compilers in NDK:"
          ls -la /opt/android-ndk-r25c/toolchains/llvm/prebuilt/linux-x86_64/bin/*clang* | grep -E "(i686|x86)" || true
          echo "---"
          ls -la /opt/android-ndk-r25c/toolchains/llvm/prebuilt/linux-x86_64/bin/ | head -30
      
      # 妫€鏌ュ苟鎵撳嵃 ExoPlayer build.gradle 鍐呭
      - name: Check ExoPlayer build.gradle
        run: |
          BUILD_GRADLE="/tmp/media3/libraries/decoder_ffmpeg/build.gradle"
          echo "=== Build.gradle content ==="
          cat "$BUILD_GRADLE"
          echo "=== End ==="
      
      # 浣跨敤 Python 鑴氭湰姝ｇ‘淇敼 build.gradle 浠ラ檺鍒?ABI
      - name: Patch ExoPlayer build.gradle to limit ABIs
        run: |
          cat > /tmp/patch_gradle.py << 'EOF'
          import re
          
          build_gradle = "/tmp/media3/libraries/decoder_ffmpeg/build.gradle"
          
          with open(build_gradle, 'r') as f:
              content = f.read()
          
          print("Original content:")
          print(content)
          print("=" * 50)
          
          # Check if already has abiFilters
          if 'abiFilters' in content:
              print("Found existing abiFilters, replacing...")
              # Replace existing abiFilters
              content = re.sub(
                  r"abiFilters\s*=\s*\[[^\]]*\]",
                  'abiFilters = ["arm64-v8a", "armeabi-v7a"]',
                  content
              )
          else:
              print("No existing abiFilters found, appending...")
              # Append ndk configuration to the end of the file
              # Note: decoder_ffmpeg/build.gradle doesn't have defaultConfig,
              # it inherits from common_library_config.gradle
              content = content.rstrip() + '\n\n// Limit ABIs to only ARM architectures\nandroid.defaultConfig.ndk.abiFilters = ["arm64-v8a", "armeabi-v7a"]\n'
          
          with open(build_gradle, 'w') as f:
              f.write(content)
          
          print("Patched content:")
          with open(build_gradle, 'r') as f:
              print(f.read())
          EOF
          
          python3 /tmp/patch_gradle.py
      
      # 娓呯悊 CMake 缂撳瓨锛堥槻姝箣鍓嶅け璐ョ殑閰嶇疆琚鐢級
      - name: Clean CMake cache before build
        run: |
          rm -rf /tmp/media3/libraries/decoder_ffmpeg/.cxx
          echo "Cleaned CMake cache"
      
      # 缂栬瘧 AAR
      - name: Build AAR
        run: |
          cd /tmp/media3
          ./gradlew :lib-decoder-ffmpeg:assembleRelease --stacktrace || {
            echo "=== Gradle build failed, searching for any generated AAR ==="
            find /tmp/media3/libraries/decoder_ffmpeg -name "*.aar" 2>/dev/null || true
            echo "=== Build outputs directory ==="
            ls -la /tmp/media3/libraries/decoder_ffmpeg/build/outputs/aar/ 2>/dev/null || true
            ls -la /tmp/media3/libraries/decoder_ffmpeg/buildout/outputs/aar/ 2>/dev/null || true
            exit 1
          }
      
      # 鏌ユ壘 AAR 鏂囦欢锛堝吋瀹?build 鍜?buildout 涓ょ璺緞锛?      - name: Locate AAR file
        run: |
          if [ -f "/tmp/media3/libraries/decoder_ffmpeg/build/outputs/aar/lib-decoder-ffmpeg-release.aar" ]; then
            AAR_PATH="/tmp/media3/libraries/decoder_ffmpeg/build/outputs/aar/lib-decoder-ffmpeg-release.aar"
            echo "Found AAR at: build/outputs/aar/"
          elif [ -f "/tmp/media3/libraries/decoder_ffmpeg/buildout/outputs/aar/lib-decoder-ffmpeg-release.aar" ]; then
            AAR_PATH="/tmp/media3/libraries/decoder_ffmpeg/buildout/outputs/aar/lib-decoder-ffmpeg-release.aar"
            echo "Found AAR at: buildout/outputs/aar/"
          else
            echo "ERROR: AAR file not found in expected locations"
            find /tmp/media3/libraries/decoder_ffmpeg -name "*.aar" 2>/dev/null || true
            exit 1
          fi
          echo "AAR_PATH=$AAR_PATH" >> $GITHUB_ENV
          ls -la "$AAR_PATH"
      
      # 涓婁紶 AAR Artifact
      - name: Upload AAR
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-extension-all
          path: ${{ env.AAR_PATH }}
          retention-days: 90
      
      # 鍙€夛細鍒涘缓 Release 骞朵笂浼?AAR
      - name: Create Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ffmpeg-extension-${{ github.run_number }}
          name: FFmpeg Extension Build ${{ github.run_number }}
          body: |
            鑷姩缂栬瘧鐨?ExoPlayer FFmpeg 鎵╁睍
            
            - ExoPlayer 鐗堟湰: ${{ env.EXOPLAYER_VERSION }}
            - FFmpeg 鐗堟湰: ${{ env.FFMPEG_VERSION }}
            - 鏀寔鐨勬灦鏋? arm64-v8a, armeabi-v7a
            - 鏀寔鐨勫瓧骞曟牸寮? PGS, SUP, DVB, DVD, ASS, SSA, SRT, WEBVTT
            
            浣跨敤鏂瑰紡锛?            1. 涓嬭浇 `ffmpeg-extension-all` artifact
            2. 瑙ｅ帇鍚庡皢 `.aar` 鏂囦欢鏀惧叆 `android/exoplayer-ffmpeg/libs/`
            3. 鍦?`android/app/build.gradle.kts` 涓坊鍔犱緷璧?          files: ${{ env.AAR_PATH }}
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
