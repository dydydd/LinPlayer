name: Publish Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 1.0.0, must match a Pre-release)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  publish:
    name: Promote Pre-release to Release
    runs-on: ubuntu-latest

    steps:
      - name: Download Pre-release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p /tmp/assets
          gh release download "v${{ inputs.version }}-pre" \
            --dir /tmp/assets \
            --repo "${{ github.repository }}"

          echo "Downloaded assets:"
          ls -lah /tmp/assets/

      - name: Verify assets
        run: |
          set -euo pipefail

          echo "Verifying downloaded assets..."

          REQUIRED_FILES=(
            "/tmp/assets/app-arm64-v8a-release.apk"
            "/tmp/assets/app-armeabi-v7a-release.apk"
            "/tmp/assets/linplayer-tv.apk"
            "/tmp/assets/LinPlayer-Windows-v${{ inputs.version }}.zip"
            "/tmp/assets/LinPlayer-Linux-v${{ inputs.version }}.tar.gz"
            "/tmp/assets/LinPlayer-macOS-v${{ inputs.version }}.zip"
          )

          # Apple TV is optional (experimental)
          APPLETV_FILE="/tmp/assets/LinPlayer-AppleTV-v${{ inputs.version }}.zip"
          if [ -f "$APPLETV_FILE" ]; then
            echo "Found Apple TV artifact (experimental)"
          else
            echo "Apple TV artifact not found (expected for experimental build)"
          fi

          for file in "${REQUIRED_FILES[@]}"; do
            if [ ! -f "$file" ]; then
              echo "Missing required asset: $file"
              exit 1
            fi
            echo "Found required asset: $(basename "$file")"
            ls -lh "$file"
          done

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          name: Release v${{ inputs.version }}
          prerelease: false
          files: /tmp/assets/*
          generate_release_notes: true
          body: |
            ## LinPlayer v${{ inputs.version }}

            ### 下载

            **Android**
            - `app-arm64-v8a-release.apk`：推荐，大多数现代 Android 设备使用此版本
            - `app-armeabi-v7a-release.apk`：兼容较老的 32 位 Android 设备

            **Android TV**
            - `linplayer-tv.apk`：专为 Android TV 优化，支持遥控器导航和焦点系统

            **Apple TV** (Experimental)
            - `LinPlayer-AppleTV-v${{ inputs.version }}.zip`：实验性支持，功能可能不完整

            **Windows**
            - `LinPlayer-Windows-v${{ inputs.version }}.zip`：解压后运行其中的可执行文件

            **Linux**
            - `LinPlayer-Linux-v${{ inputs.version }}.tar.gz`：解压后运行目录中的可执行文件

            **macOS**
            - `LinPlayer-macOS-v${{ inputs.version }}.zip`：解压后打开 `.app` 应用包

            ### 安装说明

            **Android**
            1. 下载适合设备架构的 APK
            2. 允许安装未知来源应用
            3. 完成安装后启动应用

            **Android TV**
            1. 下载 `linplayer-tv.apk`
            2. 通过 ADB 或文件管理器安装到 Android TV
            3. 使用遥控器导航，支持方向键和确认键
            4. 注意事项：
               - 强制深色模式，无浅色选项
               - 支持遥控器焦点导航（放大 1.15x + 白色边框）
               - 播放器支持 MPV（默认）和 ExoPlayer 切换
               - 虚拟键盘 26 键布局，左右键切换

            **Apple TV** (Experimental)
            1. 下载 ZIP 文件
            2. 当前为实验性构建，完整 tvOS 支持需要额外配置
            3. 关注后续版本更新以获取完整 Apple TV 支持

            **Windows**
            1. 下载 ZIP 文件
            2. 解压到任意目录
            3. 运行其中的应用程序

            **Linux**
            1. 下载 `.tar.gz` 文件
            2. 解压到任意目录
            3. 为可执行文件添加执行权限后运行

            **macOS**
            1. 下载 ZIP 文件
            2. 解压得到 `.app`
            3. 首次打开如遇到安全提示，请在系统设置中允许启动

      - name: Delete Pre-release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete "v${{ inputs.version }}-pre" \
            --yes \
            --repo "${{ github.repository }}" \
            --cleanup-tag
