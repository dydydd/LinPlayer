name: Build libmpv with PGS support

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 3'

env:
  BUILD_REPO: media-kit/libmpv-android-video-build

jobs:
  build-libmpv:
    name: Build libmpv with PGS
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout libmpv-android-video-build
        uses: actions/checkout@v4
        with:
          repository: ${{ env.BUILD_REPO }}
          path: libmpv-build
      
      - name: Check build configuration
        run: |
          echo "=== Build configuration files ==="
          find libmpv-build -name "*.sh" -o -name "build.gradle" -o -name "CMakeLists.txt" | head -20
          
          echo "=== Looking for decoder configuration ==="
          grep -r "pgssub\|subtitle\|decoder" libmpv-build --include="*.sh" --include="*.gradle" --include="*.txt" 2>/dev/null | head -20 || true
      
      - name: Enable PGS decoder in build
        run: |
          # Find and modify build scripts to enable pgssub
          cd libmpv-build
          
          # Look for ffmpeg configuration
          FFMPEG_CONFIG=$(find . -name "*.sh" -exec grep -l "disable-everything\|enable-decoder" {} \; | head -1)
          if [ -n "$FFMPEG_CONFIG" ]; then
            echo "Found ffmpeg config: $FFMPEG_CONFIG"
            # Add pgssub decoder
            sed -i 's/--disable-everything/--disable-everything --enable-decoder=pgssub --enable-decoder=dvdsub --enable-decoder=dvbsub/' "$FFMPEG_CONFIG" || true
            echo "Modified ffmpeg config"
          fi
      
      - name: Setup build environment
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 python3-pip ninja-build cmake pkg-config
          pip3 install meson
      
      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25c
          link-to-sdk: true
      
      - name: Build libmpv (all architectures)
        run: |
          cd libmpv-build
          # Check available build scripts
          ls -la build/ 2>/dev/null || true
          ls -la scripts/ 2>/dev/null || true
          
          # Try to build
          if [ -f "build.sh" ]; then
            bash build.sh
          elif [ -f "gradlew" ]; then
            ./gradlew assembleRelease
          else
            echo "No build script found"
            find . -name "build.sh" -o -name "gradlew" | head -10
          fi
        continue-on-error: true
      
      - name: Extract JARs
        run: |
          echo "=== Looking for built JARs ==="
          find libmpv-build -name "*.jar" -type f 2>/dev/null | while read jar; do
            echo "Found JAR: $jar"
          done
          
          # Create output directory
          mkdir -p built-libraries
          
          # Extract libmpv.so from JARs
          find libmpv-build -name "default-*.jar" -type f | while read jar; do
            abi=$(basename "$jar" .jar | sed 's/default-//')
            echo "Extracting $abi from $jar..."
            mkdir -p "built-libraries/$abi"
            cd "built-libraries/$abi"
            jar xf "$jar"
            cd ../..
          done
          
          echo "=== Extracted libraries ==="
          find built-libraries -name "libmpv.so" -exec ls -lh {} \;
      
      - name: Verify PGS support
        run: |
          find built-libraries -name "libmpv.so" | while read lib; do
            echo "Checking $(basename $(dirname $lib))..."
            if strings "$lib" | grep -q "pgssub"; then
              echo "✅ PGS decoder found"
            else
              echo "⚠️ PGS decoder not found"
            fi
          done
        continue-on-error: true
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: libmpv-pgs-build
          path: built-libraries/**/libmpv.so
          if-no-files-found: ignore
          retention-days: 90

  commit-libraries:
    name: Commit to LinPlayer
    needs: build-libmpv
    runs-on: ubuntu-latest
    steps:
      - name: Checkout LinPlayer
        uses: actions/checkout@v4
      
      - name: Download built libraries
        uses: actions/download-artifact@v4
        with:
          name: libmpv-pgs-build
          path: downloaded
      
      - name: Copy to jniLibs
        run: |
          mkdir -p android/app/src/main/jniLibs
          
          find downloaded -name "libmpv.so" | while read lib; do
            # Extract ABI from path
            abi=$(basename $(dirname "$lib"))
            mkdir -p "android/app/src/main/jniLibs/$abi"
            cp "$lib" "android/app/src/main/jniLibs/$abi/"
            echo "✅ Copied libmpv.so for $abi"
          done
      
      - name: Commit and push
        run: |
          echo "=== Final jniLibs ==="
          find android/app/src/main/jniLibs -name "*.so" -exec ls -lh {} \;
          
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add android/app/src/main/jniLibs/
          
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update libmpv with PGS support (built from ${{ env.BUILD_REPO }})"
            git push
            echo "✅ Libraries committed"
          fi
        continue-on-error: true