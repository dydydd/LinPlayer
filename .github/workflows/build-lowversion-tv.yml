name: Build LowVersion TV (legacy/tv-legacy)

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "legacy/tv-legacy/**"
      - ".github/workflows/build-lowversion-tv.yml"
  push:
    branches:
      - main
    paths:
      - "legacy/tv-legacy/**"
      - ".github/workflows/build-lowversion-tv.yml"

permissions:
  contents: read

jobs:
  build-tv-legacy:
    name: Build APK (API 19)
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: "17"

      - name: Compute build version
        shell: bash
        run: bash .github/scripts/compute_version.sh

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK packages
        shell: bash
        run: |
          set -euo pipefail
          sdkmanager --install \
            "platform-tools" \
            "platforms;android-36" \
            "build-tools;36.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          build-root-directory: legacy/tv-legacy

      - name: Make Gradle wrapper executable
        shell: bash
        run: chmod +x legacy/tv-legacy/gradlew

      - name: Resolve artifact mode
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          if [[ -n "${ANDROID_KEYSTORE_BASE64:-}" && -n "${ANDROID_KEYSTORE_PASSWORD:-}" && -n "${ANDROID_KEY_ALIAS:-}" && -n "${ANDROID_KEY_PASSWORD:-}" ]]; then
            echo "LEGACY_TV_BUILD_VARIANT=release" >> "$GITHUB_ENV"
            echo "LEGACY_TV_GRADLE_TASK=:app:assembleRelease" >> "$GITHUB_ENV"
            echo "LEGACY_TV_APK_PATH=legacy/tv-legacy/app/build/outputs/apk/release/app-release.apk" >> "$GITHUB_ENV"
            echo "LEGACY_TV_ARTIFACT_NAME=LinPlayer-LowVersion-TV-${VERSION_FULL}.apk" >> "$GITHUB_ENV"
          else
            echo "LEGACY_TV_BUILD_VARIANT=debug" >> "$GITHUB_ENV"
            echo "LEGACY_TV_GRADLE_TASK=:app:assembleDebug" >> "$GITHUB_ENV"
            echo "LEGACY_TV_APK_PATH=legacy/tv-legacy/app/build/outputs/apk/debug/app-debug.apk" >> "$GITHUB_ENV"
            echo "LEGACY_TV_ARTIFACT_NAME=LinPlayer-LowVersion-TV-debug-nonupgrade-${VERSION_FULL}.apk" >> "$GITHUB_ENV"
            {
              echo "### Legacy TV signing"
              echo ""
              echo "Release signing secrets are missing, so this run falls back to a debug APK."
              echo "That debug artifact is intentionally marked non-upgrade because it cannot reliably cover-install prior CI builds."
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Configure Android release signing (OTA-safe)
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          if [[ "${LEGACY_TV_BUILD_VARIANT:-}" != "release" ]]; then
            echo "Legacy TV release signing not requested for this run; skipping."
            exit 0
          fi

          python3 .github/scripts/decode_android_keystore.py legacy/tv-legacy/release.keystore
          printf "storePassword=%s\nkeyPassword=%s\nkeyAlias=%s\nstoreFile=release.keystore\n" \
            "$ANDROID_KEYSTORE_PASSWORD" \
            "$ANDROID_KEY_PASSWORD" \
            "$ANDROID_KEY_ALIAS" \
            > legacy/tv-legacy/key.properties

          bash .github/scripts/verify_android_signing.sh \
            legacy/tv-legacy/release.keystore \
            "$ANDROID_KEYSTORE_PASSWORD" \
            "$ANDROID_KEY_PASSWORD" \
            "$ANDROID_KEY_ALIAS"

      - name: Assemble APK
        shell: bash
        run: |
          set -euo pipefail
          ./legacy/tv-legacy/gradlew -p legacy/tv-legacy "$LEGACY_TV_GRADLE_TASK" \
            -Plinplayer.versionCode="$BUILD_NUMBER" \
            -Plinplayer.versionName="$BUILD_NAME"

      - name: Stage APK artifact
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          cp -v "$LEGACY_TV_APK_PATH" "dist/$LEGACY_TV_ARTIFACT_NAME"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: LinPlayer-LowVersion-TV
          path: dist/*.apk
