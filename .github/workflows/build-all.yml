# Build all platform packages and publish a nightly release in one workflow run.

name: Build Nightly (All Packages)
run-name: Nightly (Run #${{ github.run_number }})

on:
  workflow_dispatch:
    inputs:
      version_full:
        description: "Full version like 1.2.3+45 (or just 1.2.3 to override build_name)"
        type: string
        required: false
      build_name:
        description: "Build name like 1.2.3"
        type: string
        required: false
      build_number:
        description: "Build number (integer) like 45"
        type: string
        required: false
      windows_archive_format:
        description: "Windows portable archive format"
        type: choice
        required: false
        default: zip
        options:
          - zip
          - 7z
          - both
concurrency:
  group: nightly-release
  cancel-in-progress: true

env:
  VERSION_FULL_INPUT: ${{ github.event.inputs.version_full }}
  BUILD_NAME_INPUT: ${{ github.event.inputs.build_name }}
  BUILD_NUMBER_INPUT: ${{ github.event.inputs.build_number }}
  WINDOWS_ARCHIVE_FORMAT_INPUT: ${{ github.event.inputs.windows_archive_format || 'zip' }}

jobs:
  build-android:
    name: Build Android APK (PHONE + TV)
    runs-on: ubuntu-latest
    env:
      PUB_CACHE: /home/runner/.pub-cache
      DANDANPLAY_PROXY_URL: ${{ secrets.DANDANPLAY_PROXY_URL }}
      TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.CI_GH_PAT || github.token }}

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Compute build version
        shell: bash
        run: bash .github/scripts/compute_version.sh

      - name: Cache Flutter pub packages
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.PUB_CACHE }}
            .dart_tool
          key: ${{ runner.os }}-pub-${{ hashFiles('pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Validate Flutter plugin wiring
        run: python3 .github/scripts/validate_flutter_plugins.py

      - name: Generate launcher icons
        run: dart run flutter_launcher_icons

      - name: Flutter analyze
        run: flutter analyze

      - name: Flutter tests
        run: flutter test

      - name: Fetch TV proxy assets (mihomo + metacubexd)
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: ./tool/fetch_tv_proxy_assets.ps1

      - name: Configure Android release signing (OTA-safe)
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          if [[ -n "${ANDROID_KEYSTORE_BASE64:-}" ]]; then
            python3 .github/scripts/decode_android_keystore.py android/release.keystore

            # key.properties is read from android/app via rootProject.file("key.properties"),
            # and storeFile is resolved relative to android/app (Gradle ':app' module).
            printf "storePassword=%s\nkeyPassword=%s\nkeyAlias=%s\nstoreFile=../release.keystore\n" \
              "$ANDROID_KEYSTORE_PASSWORD" \
              "$ANDROID_KEY_PASSWORD" \
              "$ANDROID_KEY_ALIAS" \
              > android/key.properties

            # Fail fast with a clear error if the keystore/password/alias don't actually work,
            # instead of spending minutes on a build just to fail at :app:packageRelease.
            bash .github/scripts/verify_android_signing.sh \
              android/release.keystore \
              "$ANDROID_KEYSTORE_PASSWORD" \
              "$ANDROID_KEY_PASSWORD" \
              "$ANDROID_KEY_ALIAS"
          else
            echo "No ANDROID_KEYSTORE_BASE64 secret set; refusing to build release APKs in CI." >&2
            echo "OTA upgrades require a stable signing key. Configure ANDROID_KEYSTORE_* secrets/env vars." >&2
            exit 1
          fi

      - name: Build APKs (PHONE + TV)
        shell: bash
        run: |
          set -euo pipefail
          OUT_DIR="build/ci-android-apks"
          rm -rf "$OUT_DIR"
          mkdir -p "$OUT_DIR"

          DART_DEFINE_ARGS=()
          if [[ -n "${DANDANPLAY_PROXY_URL:-}" ]]; then
            DART_DEFINE_ARGS+=(--dart-define=LINPLAYER_DANDANPLAY_PROXY_URL="${DANDANPLAY_PROXY_URL}")
          fi
          if [[ -n "${TMDB_API_KEY:-}" ]]; then
            DART_DEFINE_ARGS+=(--dart-define=TMDB_API_KEY="${TMDB_API_KEY}")
          fi

          flutter build apk --release --split-per-abi --target-platform android-arm64 --build-name "$BUILD_NAME" --build-number "$BUILD_NUMBER" "${DART_DEFINE_ARGS[@]}"
          cp -v build/app/outputs/flutter-apk/app-arm64-v8a-release.apk "$OUT_DIR/LinPlayer-Android-PHONE-arm64-v8a.apk"

          flutter build apk --release --split-per-abi --target-platform android-arm --build-name "$BUILD_NAME" --build-number "$BUILD_NUMBER" --dart-define=LINPLAYER_FORCE_TV=true "${DART_DEFINE_ARGS[@]}"
          cp -v build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk "$OUT_DIR/LinPlayer-Android-TV-armeabi-v7a.apk"

          echo "--- Staged APKs ---"
          ls -la "$OUT_DIR"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: LinPlayer-Android-PHONE-TV-APKs-${{ env.VERSION_FULL }}
          path: build/ci-android-apks/*.apk

  build-windows:
    name: Build Windows Packages (x64)
    runs-on: windows-latest
    env:
      PUB_CACHE: C:\Users\runneradmin\AppData\Local\Pub\Cache
      DANDANPLAY_PROXY_URL: ${{ secrets.DANDANPLAY_PROXY_URL }}
      TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.CI_GH_PAT || github.token }}

      - name: Configure Git auth for non-interactive CI
        shell: pwsh
        env:
          GH_AUTH_TOKEN: ${{ secrets.CI_GH_PAT || github.token }}
        run: |
          git config --global credential.interactive never
          git config --global url."https://x-access-token:$env:GH_AUTH_TOKEN@github.com/".insteadOf "https://github.com/"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Cache Flutter pub packages
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.PUB_CACHE }}
            .dart_tool
          key: ${{ runner.os }}-pub-${{ hashFiles('pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Generate launcher icons
        shell: pwsh
        run: dart run flutter_launcher_icons

      - name: Compute build version
        shell: pwsh
        run: .github/scripts/compute_version.ps1

      - name: Enable Windows desktop support
        run: flutter config --enable-windows-desktop

      - name: Verify Windows platform scaffolding
        shell: pwsh
        run: |
          if (-not (Test-Path "windows/flutter")) {
            throw "windows/flutter is missing. Commit the Windows platform files; do not run flutter create in CI."
          }

      - name: Build Windows executable
        shell: pwsh
        run: |
          $dartDefineArgs = @()
          if (-not [string]::IsNullOrWhiteSpace($env:DANDANPLAY_PROXY_URL)) {
            $dartDefineArgs += "--dart-define=LINPLAYER_DANDANPLAY_PROXY_URL=$env:DANDANPLAY_PROXY_URL"
          }
          if (-not [string]::IsNullOrWhiteSpace($env:TMDB_API_KEY)) {
            $dartDefineArgs += "--dart-define=TMDB_API_KEY=$env:TMDB_API_KEY"
          }
          flutter build windows --release --build-name $env:BUILD_NAME --build-number $env:BUILD_NUMBER @dartDefineArgs

      - name: Resolve Windows release directory
        shell: pwsh
        run: |
          $release64 = "build/windows/x64/runner/Release"
          $releaseLegacy = "build/windows/runner/Release"
          if (Test-Path $release64) {
            $release = $release64
          } elseif (Test-Path $releaseLegacy) {
            $release = $releaseLegacy
          } else {
            throw "Release folder not found after build."
          }

          $resolvedRelease = (Resolve-Path $release).Path
          "WINDOWS_RELEASE_DIR=$resolvedRelease" >> $env:GITHUB_ENV
          Write-Host "WINDOWS_RELEASE_DIR=$resolvedRelease"

      - name: Copy MSVC runtime DLLs
        shell: pwsh
        run: |
          if ([string]::IsNullOrWhiteSpace($env:WINDOWS_RELEASE_DIR) -or -not (Test-Path $env:WINDOWS_RELEASE_DIR)) {
            throw "WINDOWS_RELEASE_DIR is missing or invalid."
          }
          $release = $env:WINDOWS_RELEASE_DIR

          $roots = @(
            "C:\Program Files\Microsoft Visual Studio\2022",
            "C:\Program Files (x86)\Microsoft Visual Studio\2022"
          )
          $crtDir = $null
          foreach ($root in $roots) {
            foreach ($edition in @("Enterprise","Professional","Community","BuildTools")) {
              $search = Join-Path $root "$edition\VC\Redist\MSVC"
              if (-not (Test-Path $search)) { continue }
              $found = Get-ChildItem -Directory -Recurse -Filter "Microsoft.VC143.CRT" $search | Sort-Object LastWriteTime -Descending | Select-Object -First 1
              if (-not $found) {
                $found = Get-ChildItem -Directory -Recurse -Filter "Microsoft.VC142.CRT" $search | Sort-Object LastWriteTime -Descending | Select-Object -First 1
              }
              if ($found) { $crtDir = $found.FullName; break }
            }
            if ($crtDir) { break }
          }
          if (-not $crtDir) { Write-Error "MSVC CRT path not found."; exit 1 }
          Copy-Item -Path (Join-Path $crtDir "*") -Destination $release -Recurse -Force

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Install 7-Zip
        if: ${{ env.WINDOWS_ARCHIVE_FORMAT_INPUT == '7z' || env.WINDOWS_ARCHIVE_FORMAT_INPUT == 'both' }}
        shell: pwsh
        run: choco install 7zip --no-progress -y

      - name: Build Windows installer
        shell: pwsh
        run: |
          if ([string]::IsNullOrWhiteSpace($env:WINDOWS_RELEASE_DIR) -or -not (Test-Path $env:WINDOWS_RELEASE_DIR)) {
            throw "WINDOWS_RELEASE_DIR is missing or invalid."
          }
          $release = $env:WINDOWS_RELEASE_DIR

          if ([string]::IsNullOrWhiteSpace($env:APP_VERSION) -or [string]::IsNullOrWhiteSpace($env:APP_VERSION_FULL)) {
            throw "Missing APP_VERSION/APP_VERSION_FULL env vars. Did 'Compute build version' run?"
          }

          $env:SOURCE_DIR = (Resolve-Path $release).Path
          $env:OUTPUT_DIR = (Resolve-Path ".").Path
          $env:APP_ARCH = "x64"
          # APP_VERSION / APP_VERSION_FULL already set by compute_version.ps1

          $iscc = Join-Path ${env:ProgramFiles(x86)} "Inno Setup 6\\ISCC.exe"
          if (-not (Test-Path $iscc)) { $iscc = Join-Path $env:ProgramFiles "Inno Setup 6\\ISCC.exe" }
          if (-not (Test-Path $iscc)) {
            $cmd = Get-Command ISCC.exe -ErrorAction SilentlyContinue
            if ($cmd) { $iscc = $cmd.Source }
          }
          if (-not (Test-Path $iscc)) { throw "ISCC.exe not found." }

          & $iscc ".github/installer/windows/linplayer.iss"
      
      - name: Rename installer for distribution
        shell: pwsh
        run: |
          if (Test-Path "LinPlayer-Setup-x64.exe") {
            Rename-Item -Path "LinPlayer-Setup-x64.exe" -NewName "LinPlayer-Windows-Setup-x64.exe" -Force
          } elseif (-not (Test-Path "LinPlayer-Windows-Setup-x64.exe")) {
            throw "Installer output not found."
          }

      - name: Package Windows portable archive(s)
        shell: pwsh
        run: |
          if ([string]::IsNullOrWhiteSpace($env:WINDOWS_RELEASE_DIR) -or -not (Test-Path $env:WINDOWS_RELEASE_DIR)) {
            throw "WINDOWS_RELEASE_DIR is missing or invalid."
          }

          $formatInput = $env:WINDOWS_ARCHIVE_FORMAT_INPUT
          if ([string]::IsNullOrWhiteSpace($formatInput)) {
            $formatInput = "zip"
          }

          $formats = switch ($formatInput.ToLowerInvariant()) {
            "zip" { @("zip") }
            "7z" { @("7z") }
            "both" { @("zip", "7z") }
            default { throw "Unsupported WINDOWS_ARCHIVE_FORMAT_INPUT: $formatInput" }
          }

          $stageRoot = Join-Path $env:RUNNER_TEMP "windows-portable"
          $portableDir = Join-Path $stageRoot "LinPlayer-Windows-Portable-x64"
          $outDir = "build/ci-windows-packages"

          Remove-Item -LiteralPath $stageRoot -Recurse -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Path $portableDir -Force | Out-Null
          New-Item -ItemType Directory -Path $outDir -Force | Out-Null

          Copy-Item -Path (Join-Path $env:WINDOWS_RELEASE_DIR "*") -Destination $portableDir -Recurse -Force

          $outDirResolved = (Resolve-Path $outDir).Path

          Push-Location $stageRoot
          try {
            if ($formats -contains "zip") {
              $zipPath = Join-Path $outDirResolved "LinPlayer-Windows-Portable-x64.zip"
              if (Test-Path $zipPath) {
                Remove-Item -LiteralPath $zipPath -Force
              }
              Compress-Archive -Path "LinPlayer-Windows-Portable-x64" -DestinationPath $zipPath -CompressionLevel Optimal
            }

            if ($formats -contains "7z") {
              $sevenZipPath = $null
              $sevenZipCommand = Get-Command 7z.exe -ErrorAction SilentlyContinue
              if ($sevenZipCommand) {
                $sevenZipPath = $sevenZipCommand.Source
              }
              if (-not $sevenZipPath) {
                foreach ($candidate in @(
                  "C:\Program Files\7-Zip\7z.exe",
                  "C:\Program Files (x86)\7-Zip\7z.exe"
                )) {
                  if (Test-Path $candidate) {
                    $sevenZipPath = $candidate
                    break
                  }
                }
              }
              if (-not $sevenZipPath) {
                throw "7z.exe not found after installing 7-Zip."
              }

              $sevenZipArchivePath = Join-Path $outDirResolved "LinPlayer-Windows-Portable-x64.7z"
              if (Test-Path $sevenZipArchivePath) {
                Remove-Item -LiteralPath $sevenZipArchivePath -Force
              }

              & $sevenZipPath a -t7z -mx=9 $sevenZipArchivePath "LinPlayer-Windows-Portable-x64"
              if ($LASTEXITCODE -ne 0) {
                throw "7z packaging failed with exit code $LASTEXITCODE."
              }
            }
          } finally {
            Pop-Location
          }

          Get-ChildItem -Path $outDirResolved

      - name: Upload Windows package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: LinPlayer-Windows-Packages-${{ env.VERSION_FULL }}
          path: |
            LinPlayer-Windows-Setup-x64.exe
            build/ci-windows-packages/LinPlayer-Windows-Portable-x64.*

  build-linux:
    name: Build Linux Packages (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            runner: ubuntu-24.04
            flutter_target_platform: linux-x64
          - arch: arm64
            runner: ubuntu-24.04-arm
            flutter_target_platform: linux-arm64
    env:
      FLUTTER_VERSION: 3.41.7
      PUB_CACHE: /home/runner/.pub-cache
      DANDANPLAY_PROXY_URL: ${{ secrets.DANDANPLAY_PROXY_URL }}
      TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.CI_GH_PAT || github.token }}

      - name: Set up Flutter (x64)
        if: matrix.arch == 'x64'
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Set up Flutter (arm64)
        if: matrix.arch == 'arm64'
        shell: bash
        run: |
          set -euo pipefail

          FLUTTER_DIR="$RUNNER_TEMP/flutter"
          git clone \
            https://github.com/flutter/flutter.git \
            --branch "$FLUTTER_VERSION" \
            --depth 1 \
            "$FLUTTER_DIR"

          echo "FLUTTER_ROOT=$FLUTTER_DIR" >> "$GITHUB_ENV"
          echo "$FLUTTER_DIR/bin" >> "$GITHUB_PATH"

          "$FLUTTER_DIR/bin/flutter" --version

      - name: Cache Flutter pub packages
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.PUB_CACHE }}
            .dart_tool
          key: ${{ runner.os }}-${{ matrix.arch }}-pub-${{ hashFiles('pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.arch }}-pub-

      - name: Install Linux build dependencies
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev libasound2-dev libmpv-dev rpm

      - name: Enable Linux desktop support
        run: flutter config --enable-linux-desktop

      - name: Verify Linux platform scaffolding
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! -d "linux/flutter" ]]; then
            echo "linux/flutter is missing. Commit the Linux platform files; do not run flutter create in CI." >&2
            exit 1
          fi

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Generate launcher icons
        run: dart run flutter_launcher_icons

      - name: Compute build version
        shell: bash
        run: bash .github/scripts/compute_version.sh

      - name: Build Linux app
        shell: bash
        run: |
          set -euo pipefail
          DART_DEFINE_ARGS=()
          if [[ -n "${DANDANPLAY_PROXY_URL:-}" ]]; then
            DART_DEFINE_ARGS+=(--dart-define=LINPLAYER_DANDANPLAY_PROXY_URL="${DANDANPLAY_PROXY_URL}")
          fi
          if [[ -n "${TMDB_API_KEY:-}" ]]; then
            DART_DEFINE_ARGS+=(--dart-define=TMDB_API_KEY="${TMDB_API_KEY}")
          fi
          flutter build linux \
            --release \
            --target-platform "${{ matrix.flutter_target_platform }}" \
            --build-name "$BUILD_NAME" \
            --build-number "$BUILD_NUMBER" \
            "${DART_DEFINE_ARGS[@]}"

      - name: Locate Linux build bundle
        shell: bash
        run: |
          set -euo pipefail

          BUNDLE_DIR="build/linux/${{ matrix.arch }}/release/bundle"
          if [[ ! -d "$BUNDLE_DIR" ]]; then
            BUNDLE_DIR="$(find build/linux -maxdepth 6 -type d -path "*/${{ matrix.arch }}/release/bundle" | head -n 1 || true)"
          fi
          if [[ -z "${BUNDLE_DIR:-}" || ! -d "$BUNDLE_DIR" ]]; then
            echo "Could not find Linux build bundle under build/linux." >&2
            find build/linux -maxdepth 6 -print || true
            exit 1
          fi

          echo "LINUX_BUNDLE_DIR=$BUNDLE_DIR" >> "$GITHUB_ENV"
          ls -la "$BUNDLE_DIR"

      - name: Package Linux artifacts (tar.gz + deb + rpm)
        shell: bash
        run: |
          set -euo pipefail
          bash .github/scripts/package_linux.sh \
            "$LINUX_BUNDLE_DIR" \
            "${{ matrix.arch }}" \
            "build/ci-linux-packages"

      - name: Upload Linux package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: LinPlayer-Linux-Packages-${{ matrix.arch }}-${{ env.VERSION_FULL }}
          path: |
            build/ci-linux-packages/LinPlayer-Linux-${{ matrix.arch }}.tar.gz
            build/ci-linux-packages/LinPlayer-Linux-${{ matrix.arch }}.deb
            build/ci-linux-packages/LinPlayer-Linux-${{ matrix.arch }}.rpm

  build-ios:
    name: Build iOS Unsigned IPA
    runs-on: macos-latest
    env:
      PUB_CACHE: /Users/runner/.pub-cache
      DANDANPLAY_PROXY_URL: ${{ secrets.DANDANPLAY_PROXY_URL }}
      TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.CI_GH_PAT || github.token }}

      - name: Configure Git auth for non-interactive CI
        shell: bash
        env:
          GH_AUTH_TOKEN: ${{ secrets.CI_GH_PAT || github.token }}
        run: |
          set -euo pipefail
          git config --global credential.interactive never
          git config --global url."https://x-access-token:${GH_AUTH_TOKEN}@github.com/".insteadOf "https://github.com/"

      - name: Harden curl downloads (macOS)
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/ci-bin"
          cat > "$RUNNER_TEMP/ci-bin/curl" <<'EOF'
          #!/usr/bin/env bash
          set -euo pipefail
          
          REAL_CURL="/usr/bin/curl"
          
          args=("$@")
          out=""
          has_continue="false"
          
          for ((i=0; i<${#args[@]}; i++)); do
            case "${args[$i]}" in
              -o|--output)
                if (( i + 1 < ${#args[@]} )); then
                  out="${args[$((i+1))]}"
                  i=$((i+1))
                fi
                ;;
              --output=*)
                out="${args[$i]#--output=}"
                ;;
              -C|--continue-at)
                has_continue="true"
                i=$((i+1))
                ;;
              --continue-at=*)
                has_continue="true"
                ;;
            esac
          done
          
          filtered=()
          for ((i=0; i<${#args[@]}; i++)); do
            a="${args[$i]}"
            case "$a" in
              --retry|--retry-delay|--retry-max-time)
                i=$((i+1))
                ;;
              --retry=*|--retry-delay=*|--retry-max-time=*|--retry-all-errors|--retry-connrefused)
                ;;
              *)
                filtered+=("$a")
                ;;
            esac
          done
          
          max_attempts="${CURL_WRAPPER_ATTEMPTS:-10}"
          retry_delay="${CURL_WRAPPER_INITIAL_DELAY_SECS:-2}"
          max_retry_delay="${CURL_WRAPPER_MAX_DELAY_SECS:-30}"
          
          status=0
          for ((attempt=1; attempt<=max_attempts; attempt++)); do
            if (( attempt > 1 )); then
              if [[ "$has_continue" != "true" && -n "${out:-}" && "${out}" != "-" ]]; then
                rm -f "${out}" || true
              fi
              sleep "$retry_delay"
            fi
          
            if "$REAL_CURL" --http1.1 "${filtered[@]}"; then
              exit 0
            fi
            status=$?

            if (( retry_delay < max_retry_delay )); then
              retry_delay=$((retry_delay * 2))
              if (( retry_delay > max_retry_delay )); then
                retry_delay="$max_retry_delay"
              fi
            fi
          done
          
          exit "$status"
          EOF
          chmod +x "$RUNNER_TEMP/ci-bin/curl"
          echo "PATH=$RUNNER_TEMP/ci-bin:$PATH" >> "$GITHUB_ENV"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Cache Flutter pub packages
        uses: actions/cache@v4
        with:
          path: ${{ env.PUB_CACHE }}
          key: ${{ runner.os }}-ios-pub-${{ hashFiles('pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-ios-pub-
            ${{ runner.os }}-pub-

      - name: Cache CocoaPods metadata (iOS)
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/CocoaPods
            ~/.cocoapods/repos/trunk
            ios/Pods
          key: ${{ runner.os }}-ios-cocoapods-${{ hashFiles('pubspec.lock', 'ios/Runner.xcodeproj/project.pbxproj') }}
          restore-keys: |
            ${{ runner.os }}-ios-cocoapods-
            ${{ runner.os }}-cocoapods-

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Generate launcher icons
        run: dart run flutter_launcher_icons

      - name: Compute build version
        shell: bash
        run: bash .github/scripts/compute_version.sh

      - name: Build iOS app (no codesign)
        shell: bash
        run: |
          set -euo pipefail
          source .github/scripts/retry.sh
          RETRY_ATTEMPTS="${RETRY_ATTEMPTS:-3}"
          RETRY_INITIAL_DELAY_SECONDS="${RETRY_INITIAL_DELAY_SECONDS:-15}"
          RETRY_MAX_DELAY_SECONDS="${RETRY_MAX_DELAY_SECONDS:-60}"

          DART_DEFINE_ARGS=()
          if [[ -n "${DANDANPLAY_PROXY_URL:-}" ]]; then
            DART_DEFINE_ARGS+=(--dart-define=LINPLAYER_DANDANPLAY_PROXY_URL="${DANDANPLAY_PROXY_URL}")
          fi
          if [[ -n "${TMDB_API_KEY:-}" ]]; then
            DART_DEFINE_ARGS+=(--dart-define=TMDB_API_KEY="${TMDB_API_KEY}")
          fi

          resolve_built_ios_app() {
            local app_path=""
            app_path="$(find build/ios -maxdepth 6 -type d -name '*.app' 2>/dev/null | grep -v RunnerTests | head -n 1 || true)"
            if [[ -z "${app_path:-}" ]]; then
              local archive_path=""
              archive_path="$(find build/ios -maxdepth 6 -type d -name '*.xcarchive' 2>/dev/null | head -n 1 || true)"
              if [[ -n "${archive_path:-}" ]]; then
                app_path="$(find "$archive_path/Products/Applications" -maxdepth 1 -type d -name '*.app' 2>/dev/null | head -n 1 || true)"
              fi
            fi

            printf '%s\n' "$app_path"
          }

          validate_built_ios_app() {
            local app_path="$1"
            if [[ -z "${app_path:-}" || ! -d "$app_path" ]]; then
              echo "Built iOS app path is missing: ${app_path:-<empty>}" >&2
              return 1
            fi

            local info_plist="$app_path/Info.plist"
            if [[ ! -f "$info_plist" ]]; then
              echo "Missing Info.plist in app bundle: $app_path" >&2
              return 1
            fi

            local executable_name=""
            executable_name="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleExecutable' "$info_plist" 2>/dev/null || true)"
            if [[ -z "${executable_name:-}" ]]; then
              echo "CFBundleExecutable missing in $info_plist" >&2
              return 1
            fi

            local executable_path="$app_path/$executable_name"
            if [[ ! -f "$executable_path" ]]; then
              echo "App executable missing: $executable_path" >&2
              return 1
            fi

            if ! file "$executable_path" | grep -q "Mach-O"; then
              echo "App executable is not a Mach-O binary: $executable_path" >&2
              return 1
            fi

            local flutter_framework="$app_path/Frameworks/Flutter.framework/Flutter"
            if [[ ! -f "$flutter_framework" ]]; then
              echo "Flutter.framework binary missing: $flutter_framework" >&2
              return 1
            fi

            local app_framework_binary="$app_path/Frameworks/App.framework/App"
            if [[ ! -f "$app_framework_binary" ]]; then
              echo "App.framework binary missing: $app_framework_binary" >&2
              return 1
            fi

            local app_size_kb=""
            app_size_kb="$(du -sk "$app_path" | awk '{print $1}')"
            if [[ ! "$app_size_kb" =~ ^[0-9]+$ ]]; then
              echo "Could not determine app bundle size for $app_path" >&2
              return 1
            fi

            if (( app_size_kb < 10240 )); then
              echo "App bundle is suspiciously small (${app_size_kb} KB): $app_path" >&2
              return 1
            fi

            return 0
          }

          find_built_ios_app() {
            resolve_built_ios_app
          }

          build_ios_once() {
            local status=0
            local app_path=""

            rm -rf build/ios build/native_assets/ios

            set +e
            flutter build ios --release --no-codesign --build-name "$BUILD_NAME" --build-number "$BUILD_NUMBER" "${DART_DEFINE_ARGS[@]}"
            status=$?
            set -e

            app_path="$(find_built_ios_app)"

            if [[ "$status" -ne 0 ]]; then
              echo "flutter build ios exited with $status; checking for built app output..."

              # flutter build ios --no-codesign can return a non-zero exit code on CI
              # with the generic "select a Development Team" message, even though the
              # Xcode build already produced a usable .app. Only treat it as a soft-fail
              # when the generated app bundle passes structural validation.
              if ! validate_built_ios_app "$app_path"; then
                echo "Build failed and no valid iOS app bundle was produced; allowing retry."
                return "$status"
              fi

              echo "Found valid built app despite non-zero exit: $app_path"
            elif ! validate_built_ios_app "$app_path"; then
              echo "Build command succeeded but produced an invalid iOS app bundle." >&2
              return 1
            fi

            echo "IOS_APP_PATH=$app_path" >> "$GITHUB_ENV"
          }

          retry build_ios_once

      - name: Package unsigned IPA
        shell: bash
        run: |
          set -euo pipefail

          resolve_built_ios_app() {
            local app_path=""
            app_path="${IOS_APP_PATH:-}"
            if [[ -z "${app_path:-}" ]]; then
              app_path="$(find build/ios -maxdepth 6 -type d -name '*.app' 2>/dev/null | grep -v RunnerTests | head -n 1 || true)"
            fi
            if [[ -z "${app_path:-}" ]]; then
              local archive_path=""
              archive_path="$(find build/ios -maxdepth 6 -type d -name '*.xcarchive' 2>/dev/null | head -n 1 || true)"
              if [[ -n "${archive_path:-}" ]]; then
                app_path="$(find "$archive_path/Products/Applications" -maxdepth 1 -type d -name '*.app' 2>/dev/null | head -n 1 || true)"
              fi
            fi

            printf '%s\n' "$app_path"
          }

          validate_built_ios_app() {
            local app_path="$1"
            if [[ -z "${app_path:-}" || ! -d "$app_path" ]]; then
              echo "Built iOS app path is missing: ${app_path:-<empty>}" >&2
              return 1
            fi

            local info_plist="$app_path/Info.plist"
            if [[ ! -f "$info_plist" ]]; then
              echo "Missing Info.plist in app bundle: $app_path" >&2
              return 1
            fi

            local executable_name=""
            executable_name="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleExecutable' "$info_plist" 2>/dev/null || true)"
            if [[ -z "${executable_name:-}" ]]; then
              echo "CFBundleExecutable missing in $info_plist" >&2
              return 1
            fi

            local executable_path="$app_path/$executable_name"
            if [[ ! -f "$executable_path" ]]; then
              echo "App executable missing: $executable_path" >&2
              return 1
            fi

            local flutter_framework="$app_path/Frameworks/Flutter.framework/Flutter"
            local app_framework_binary="$app_path/Frameworks/App.framework/App"
            if [[ ! -f "$flutter_framework" || ! -f "$app_framework_binary" ]]; then
              echo "App bundle frameworks are incomplete: $app_path" >&2
              return 1
            fi

            local app_size_kb=""
            app_size_kb="$(du -sk "$app_path" | awk '{print $1}')"
            if [[ ! "$app_size_kb" =~ ^[0-9]+$ || "$app_size_kb" -lt 10240 ]]; then
              echo "App bundle is suspiciously small (${app_size_kb:-unknown} KB): $app_path" >&2
              return 1
            fi

            return 0
          }

          APP_PATH="$(resolve_built_ios_app)"
          if ! validate_built_ios_app "$APP_PATH"; then
            echo "--- Debug: build/ios (maxdepth 5) ---"
            find build/ios -maxdepth 5 -print || true
            echo "--- Debug: app bundle snapshot ---"
            find "$APP_PATH" -maxdepth 3 -print 2>/dev/null || true
            exit 1
          fi

          rm -rf Payload LinPlayer-iPhone-unsigned.ipa
          mkdir -p Payload
          ditto "$APP_PATH" "Payload/$(basename "$APP_PATH")"

          ditto -c -k --sequesterRsrc --keepParent Payload LinPlayer-iPhone-unsigned.ipa

          IPA_SIZE_BYTES="$(stat -f%z LinPlayer-iPhone-unsigned.ipa)"
          if [[ ! "$IPA_SIZE_BYTES" =~ ^[0-9]+$ || "$IPA_SIZE_BYTES" -lt 1048576 ]]; then
            echo "Generated IPA is suspiciously small (${IPA_SIZE_BYTES:-unknown} bytes)." >&2
            exit 1
          fi

          echo "Packaged IPA size: ${IPA_SIZE_BYTES} bytes"

      - name: Upload unsigned IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: LinPlayer-iPhone-Unsigned-IPA-${{ env.VERSION_FULL }}
          path: LinPlayer-iPhone-unsigned.ipa

  build-macos:
    name: Build macOS DMG (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runner: macos-15
          - arch: x86_64
            runner: macos-15-intel
    env:
      PUB_CACHE: /Users/runner/.pub-cache
      DANDANPLAY_PROXY_URL: ${{ secrets.DANDANPLAY_PROXY_URL }}
      TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.CI_GH_PAT || github.token }}

      - name: Harden curl downloads (macOS)
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/ci-bin"
          cat > "$RUNNER_TEMP/ci-bin/curl" <<'EOF'
          #!/usr/bin/env bash
          set -euo pipefail
          
          REAL_CURL="/usr/bin/curl"
          
          args=("$@")
          out=""
          has_continue="false"
          
          for ((i=0; i<${#args[@]}; i++)); do
            case "${args[$i]}" in
              -o|--output)
                if (( i + 1 < ${#args[@]} )); then
                  out="${args[$((i+1))]}"
                  i=$((i+1))
                fi
                ;;
              --output=*)
                out="${args[$i]#--output=}"
                ;;
              -C|--continue-at)
                has_continue="true"
                i=$((i+1))
                ;;
              --continue-at=*)
                has_continue="true"
                ;;
            esac
          done
          
          filtered=()
          for ((i=0; i<${#args[@]}; i++)); do
            a="${args[$i]}"
            case "$a" in
              --retry|--retry-delay|--retry-max-time)
                i=$((i+1))
                ;;
              --retry=*|--retry-delay=*|--retry-max-time=*|--retry-all-errors|--retry-connrefused)
                ;;
              *)
                filtered+=("$a")
                ;;
            esac
          done
          
          max_attempts="${CURL_WRAPPER_ATTEMPTS:-10}"
          retry_delay="${CURL_WRAPPER_INITIAL_DELAY_SECS:-2}"
          max_retry_delay="${CURL_WRAPPER_MAX_DELAY_SECS:-30}"
          
          status=0
          for ((attempt=1; attempt<=max_attempts; attempt++)); do
            if (( attempt > 1 )); then
              if [[ "$has_continue" != "true" && -n "${out:-}" && "${out}" != "-" ]]; then
                rm -f "${out}" || true
              fi
              sleep "$retry_delay"
            fi
          
            if "$REAL_CURL" --http1.1 "${filtered[@]}"; then
              exit 0
            fi
            status=$?

            if (( retry_delay < max_retry_delay )); then
              retry_delay=$((retry_delay * 2))
              if (( retry_delay > max_retry_delay )); then
                retry_delay="$max_retry_delay"
              fi
            fi
          done
          
          exit "$status"
          EOF
          chmod +x "$RUNNER_TEMP/ci-bin/curl"
          echo "PATH=$RUNNER_TEMP/ci-bin:$PATH" >> "$GITHUB_ENV"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Cache Flutter pub packages
        uses: actions/cache@v4
        with:
          path: ${{ env.PUB_CACHE }}
          key: ${{ runner.os }}-${{ matrix.arch }}-pub-${{ hashFiles('pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.arch }}-pub-
            ${{ runner.os }}-pub-

      - name: Cache CocoaPods metadata (macOS)
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/CocoaPods
            ~/.cocoapods/repos/trunk
            macos/Pods
          key: ${{ runner.os }}-${{ matrix.arch }}-macos-cocoapods-${{ hashFiles('pubspec.lock', 'macos/Runner.xcodeproj/project.pbxproj') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.arch }}-macos-cocoapods-
            ${{ runner.os }}-cocoapods-

      - name: Enable macOS desktop support
        run: flutter config --enable-macos-desktop

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Generate launcher icons
        run: dart run flutter_launcher_icons

      - name: Compute build version
        shell: bash
        run: bash .github/scripts/compute_version.sh

      - name: Build macOS app
        shell: bash
        run: |
          set -euo pipefail
          source .github/scripts/retry.sh
          RETRY_ATTEMPTS="${RETRY_ATTEMPTS:-3}"
          RETRY_INITIAL_DELAY_SECONDS="${RETRY_INITIAL_DELAY_SECONDS:-15}"
          RETRY_MAX_DELAY_SECONDS="${RETRY_MAX_DELAY_SECONDS:-60}"

          DART_DEFINE_ARGS=()
          if [[ -n "${DANDANPLAY_PROXY_URL:-}" ]]; then
            DART_DEFINE_ARGS+=(--dart-define=LINPLAYER_DANDANPLAY_PROXY_URL="${DANDANPLAY_PROXY_URL}")
          fi
          if [[ -n "${TMDB_API_KEY:-}" ]]; then
            DART_DEFINE_ARGS+=(--dart-define=TMDB_API_KEY="${TMDB_API_KEY}")
          fi

          build_macos_once() {
            rm -rf build/macos build/native_assets/macos
            flutter build macos --release --build-name "$BUILD_NAME" --build-number "$BUILD_NUMBER" "${DART_DEFINE_ARGS[@]}"
          }

          retry build_macos_once

      - name: Debug macOS build outputs on failure
        if: failure()
        shell: bash
        run: |
          set +e
          echo "--- build/native_assets ---"
          find build/native_assets -maxdepth 5 -print || true
          echo "--- NativeAssetsManifest.json ---"
          find build -name NativeAssetsManifest.json -print -exec cat {} \; || true
          echo "--- build/macos ---"
          find build/macos -maxdepth 6 -print || true

      - name: Create DMG installer
        shell: bash
        run: |
          set -euo pipefail

          APP_PATH="$(find build/macos -maxdepth 7 -type d -name '*.app' 2>/dev/null | grep -v 'RunnerTests' | head -n 1 || true)"
          if [[ -z "${APP_PATH:-}" || ! -d "$APP_PATH" ]]; then
            echo "Could not find built .app under build/macos."
            find build/macos -maxdepth 5 -print || true
            exit 1
          fi

          STAGING="$RUNNER_TEMP/dmg-staging"
          rm -rf "$STAGING"
          mkdir -p "$STAGING"
          ditto "$APP_PATH" "$STAGING/$(basename "$APP_PATH")"
          ln -s /Applications "$STAGING/Applications"
          hdiutil create -volname "LinPlayer" -srcfolder "$STAGING" -ov -format UDZO "LinPlayer-macOS-${{ matrix.arch }}.dmg"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: LinPlayer-macOS-DMG-${{ matrix.arch }}-${{ env.VERSION_FULL }}
          path: LinPlayer-macOS-${{ matrix.arch }}.dmg
  
  publish-nightly:
    name: Publish Nightly Release
    runs-on: ubuntu-latest
    needs:
      - build-android
      - build-windows
      - build-linux
      - build-ios
      - build-macos
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Check out code (for tagging)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.CI_GH_PAT || github.token }}

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Ensure GitHub CLI is available
        shell: bash
        run: |
          set -euo pipefail
          if ! command -v gh >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y gh
          fi

      - name: Compute build version
        shell: bash
        run: bash .github/scripts/compute_version.sh

      - name: Update nightly tag
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f nightly "$GITHUB_SHA"
          git push -f origin refs/tags/nightly

      - name: Create or update nightly release
        shell: bash
        run: |
          set -euo pipefail
          source .github/scripts/retry.sh
          NOTES="$(cat <<EOF
          Nightly build

          - Version: ${VERSION_FULL}
          - Commit: ${GITHUB_SHA}
          - Date (UTC): $(date -u '+%Y-%m-%d %H:%M:%S')
          EOF
          )"

          if gh_retry release view nightly >/dev/null 2>&1; then
            gh_retry release edit nightly --title "Nightly (${VERSION_FULL})" --notes "$NOTES"
          else
            gh_retry release create nightly --title "Nightly (${VERSION_FULL})" --notes "$NOTES" --prerelease
          fi

      - name: Purge old nightly assets (LinPlayer-*)
        shell: bash
        run: |
          set -euo pipefail
          source .github/scripts/retry.sh
          mapfile -t old_ids < <(
            gh_retry api "repos/${GITHUB_REPOSITORY}/releases/tags/nightly" \
              --jq '.assets[] | select(.name | startswith("LinPlayer-")) | .id'
          )
          if [[ ${#old_ids[@]} -eq 0 ]]; then
            echo "No existing LinPlayer-* assets to purge."
            exit 0
          fi
          for id in "${old_ids[@]}"; do
            gh_retry api -X DELETE "repos/${GITHUB_REPOSITORY}/releases/assets/$id"
          done

      - name: Upload release assets (overwrite)
        shell: bash
        run: |
          set -euo pipefail
          source .github/scripts/retry.sh

          linux_assets=(
            "LinPlayer-Linux-x64.tar.gz"
            "LinPlayer-Linux-x64.deb"
            "LinPlayer-Linux-x64.rpm"
            "LinPlayer-Linux-arm64.tar.gz"
            "LinPlayer-Linux-arm64.deb"
            "LinPlayer-Linux-arm64.rpm"
          )
          windows_assets=(
            "LinPlayer-Windows-Setup-x64.exe"
          )
          if [[ -f "dist/LinPlayer-Windows-Portable-x64.zip" ]]; then
            windows_assets+=("LinPlayer-Windows-Portable-x64.zip")
          fi
          if [[ -f "dist/LinPlayer-Windows-Portable-x64.7z" ]]; then
            windows_assets+=("LinPlayer-Windows-Portable-x64.7z")
          fi

          gh_retry release upload nightly "dist/LinPlayer-Android-PHONE-arm64-v8a.apk" --clobber
          gh_retry release upload nightly "dist/LinPlayer-Android-TV-armeabi-v7a.apk" --clobber
          for asset in "${windows_assets[@]}"; do
            gh_retry release upload nightly "dist/${asset}" --clobber
          done
          for asset in "${linux_assets[@]}"; do
            gh_retry release upload nightly "dist/${asset}" --clobber
          done
          gh_retry release upload nightly "dist/LinPlayer-iPhone-unsigned.ipa" --clobber
          gh_retry release upload nightly "dist/LinPlayer-macOS-arm64.dmg" --clobber
          gh_retry release upload nightly "dist/LinPlayer-macOS-x86_64.dmg" --clobber

          # Apple TV (tvOS) is optional/experimental.
          if [[ -f "dist/LinPlayer-AppleTV-unsigned.ipa" ]]; then
            gh_retry release upload nightly "dist/LinPlayer-AppleTV-unsigned.ipa" --clobber
          fi

      - name: Remove stale/duplicate nightly assets
        shell: bash
        run: |
          set -euo pipefail
          source .github/scripts/retry.sh

          # Keep only the latest asset for each expected filename, and remove any older/stale
          # LinPlayer-* assets that may have been left behind by previous workflow versions.
          expected_assets=(
            "LinPlayer-Android-PHONE-arm64-v8a.apk"
            "LinPlayer-Android-TV-armeabi-v7a.apk"
            "LinPlayer-Windows-Setup-x64.exe"
            "LinPlayer-Linux-x64.tar.gz"
            "LinPlayer-Linux-x64.deb"
            "LinPlayer-Linux-x64.rpm"
            "LinPlayer-Linux-arm64.tar.gz"
            "LinPlayer-Linux-arm64.deb"
            "LinPlayer-Linux-arm64.rpm"
            "LinPlayer-iPhone-unsigned.ipa"
            "LinPlayer-macOS-arm64.dmg"
            "LinPlayer-macOS-x86_64.dmg"
          )
          if [[ -f "dist/LinPlayer-Windows-Portable-x64.zip" ]]; then
            expected_assets+=("LinPlayer-Windows-Portable-x64.zip")
          fi
          if [[ -f "dist/LinPlayer-Windows-Portable-x64.7z" ]]; then
            expected_assets+=("LinPlayer-Windows-Portable-x64.7z")
          fi
          if [[ -f "dist/LinPlayer-AppleTV-unsigned.ipa" ]]; then
            expected_assets+=("LinPlayer-AppleTV-unsigned.ipa")
          fi

          declare -A expected=()
          for name in "${expected_assets[@]}"; do
            expected["$name"]=1
          done

          # Fetch current nightly release assets (id, name, created_at).
          mapfile -t assets < <(
            gh_retry api "repos/${GITHUB_REPOSITORY}/releases/tags/nightly" \
              --jq '.assets[] | "\(.id)\t\(.name)\t\(.created_at)"'
          )

          if [[ ${#assets[@]} -eq 0 ]]; then
            echo "No nightly assets found; nothing to clean."
            exit 0
          fi

          # Determine which asset id to keep for each expected name (newest created_at).
          declare -A keep_id=()
          declare -A keep_ts=()
          for line in "${assets[@]}"; do
            id="${line%%$'\t'*}"
            rest="${line#*$'\t'}"
            name="${rest%%$'\t'*}"
            ts="${rest#*$'\t'}"

            if [[ -z "${expected[$name]+x}" ]]; then
              continue
            fi

            if [[ -z "${keep_ts[$name]+x}" || "$ts" > "${keep_ts[$name]}" ]]; then
              keep_ts["$name"]="$ts"
              keep_id["$name"]="$id"
            fi
          done

          # Delete any stale LinPlayer-* assets not in expected list.
          for line in "${assets[@]}"; do
            id="${line%%$'\t'*}"
            rest="${line#*$'\t'}"
            name="${rest%%$'\t'*}"

            if [[ "$name" != LinPlayer-* ]]; then
              continue
            fi
            if [[ -n "${expected[$name]+x}" ]]; then
              continue
            fi

            echo "Deleting stale asset: $name ($id)"
            gh_retry api -X DELETE "repos/${GITHUB_REPOSITORY}/releases/assets/$id"
          done

          # Delete duplicates for expected assets, keeping only the newest one per name.
          for line in "${assets[@]}"; do
            id="${line%%$'\t'*}"
            rest="${line#*$'\t'}"
            name="${rest%%$'\t'*}"

            if [[ -z "${expected[$name]+x}" ]]; then
              continue
            fi
            if [[ "${keep_id[$name]}" == "$id" ]]; then
              continue
            fi

            echo "Deleting duplicate asset: $name ($id)"
            gh_retry api -X DELETE "repos/${GITHUB_REPOSITORY}/releases/assets/$id"
          done

      - name: Update VitePress download page
        shell: bash
        run: |
          set -euo pipefail
          python3 .github/scripts/generate_download_page.py --repo "${GITHUB_REPOSITORY}" --out "docs/download.md"

      - name: Commit download page (if changed)
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "$(git status --porcelain -- docs/download.md)" ]]; then
            echo "No changes in docs/download.md"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/download.md
          git commit -m "docs: update download page"
          git push

