name: Build Flutter

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 1.0.0)'
        required: true
        type: string

jobs:
  # ============================================================
  # Android 构建
  # ============================================================
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            echo "version=${{ inputs.version }}" >> $GITHUB_OUTPUT
          else
            PUBSPEC_VER=$(grep '^version:' pubspec.yaml | head -1 | sed 's/version: *//' | cut -d'+' -f1)
            echo "version=${PUBSPEC_VER}-build${{ github.run_number }}" >> $GITHUB_OUTPUT
          fi

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true
      
      - name: Get dependencies
        run: flutter pub get
      
      - name: Fix plugin namespaces for AGP 8
        run: |
          # brightness_volume 1.0.3 doesn't have namespace (required by AGP 8.x)
          PLUGIN_DIR="/home/runner/.pub-cache/hosted/pub.dev/brightness_volume-1.0.3/android"
          if [ -f "$PLUGIN_DIR/build.gradle" ] && ! grep -q "namespace" "$PLUGIN_DIR/build.gradle"; then
            if [ -f "$PLUGIN_DIR/src/main/AndroidManifest.xml" ]; then
              PACKAGE=$(grep -o 'package="[^"]*"' "$PLUGIN_DIR/src/main/AndroidManifest.xml" | head -1 | cut -d'"' -f2)
              if [ -n "$PACKAGE" ]; then
                echo "Adding namespace '$PACKAGE' to brightness_volume"
                # Add namespace after 'android {' line
                sed -i "/^android {/a\\    namespace '$PACKAGE'" "$PLUGIN_DIR/build.gradle"
                echo "Patched build.gradle:"
                cat "$PLUGIN_DIR/build.gradle"
              fi
            fi
          fi

      - name: Fix plugin compileSdk for androidx
        run: |
          # Many Flutter plugins use low compileSdk, but androidx dependencies require 36+
          for dir in /home/runner/.pub-cache/hosted/pub.dev/*/android; do
            if [ -f "$dir/build.gradle" ]; then
              # Fix compileSdkVersion in Groovy-based build.gradle
              sed -i -E "s/compileSdkVersion [0-9]+/compileSdkVersion 36/g" "$dir/build.gradle"
              sed -i -E "s/compileSdk = [0-9]+/compileSdk = 36/g" "$dir/build.gradle"
              # Fix compileSdk in Kotlin DSL build.gradle.kts
              if [ -f "$dir/build.gradle.kts" ]; then
                sed -i -E "s/compileSdkVersion = [0-9]+/compileSdkVersion = 36/g" "$dir/build.gradle.kts"
                sed -i -E "s/compileSdk = [0-9]+/compileSdk = 36/g" "$dir/build.gradle.kts"
              fi
            fi
            if [ -f "$dir/build.gradle.kts" ]; then
              sed -i -E "s/compileSdkVersion = [0-9]+/compileSdkVersion = 36/g" "$dir/build.gradle.kts"
              sed -i -E "s/compileSdk = [0-9]+/compileSdk = 36/g" "$dir/build.gradle.kts"
            fi
          done
      
      - name: Analyze code
        run: flutter analyze --no-fatal-infos --no-fatal-warnings
      
      - name: Build Release APK (split per ABI)
        env:
          DANDANPLAY_APP_ID: ${{ secrets.DANDANPLAY_APP_ID }}
          DANDANPLAY_APP_SECRET: ${{ secrets.DANDANPLAY_APP_SECRET }}
        run: |
          # Install Android SDK Platform 36 for compileSdk 36
          $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --install "platforms;android-36" 2>/dev/null || true
          
          # Strip newlines from secrets (GitHub secrets may contain trailing newlines)
          CLEAN_ID=$(echo -n "$DANDANPLAY_APP_ID" | tr -d '\n\r')
          CLEAN_SECRET=$(echo -n "$DANDANPLAY_APP_SECRET" | tr -d '\n\r')
          
          flutter build apk --release --split-per-abi \
            --target-platform android-arm,android-arm64 \
            --dart-define=DANDANPLAY_APP_ID="$CLEAN_ID" \
            --dart-define=DANDANPLAY_APP_SECRET="$CLEAN_SECRET"
      
      - name: Upload arm64-v8a APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk-arm64-v8a
          path: build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
          retention-days: 30
      
      - name: Upload armeabi-v7a APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk-armeabi-v7a
          path: build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
          retention-days: 30

      - name: Upload build logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-android
          path: build/
          retention-days: 3

  # ============================================================
  # Windows 桌面端构建
  # ============================================================
  build-windows:
    name: Build Windows Desktop
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Determine version
        id: version
        shell: pwsh
        run: |
          if ("${{ inputs.version }}") {
            echo "version=${{ inputs.version }}" >> $env:GITHUB_OUTPUT
          } else {
            $PUBSPEC_VER = (Get-Content pubspec.yaml | Select-String '^version:' | Select-Object -First 1).ToString().Replace('version:', '').Trim().Split('+')[0]
            echo "version=$PUBSPEC_VER-build${{ github.run_number }}" >> $env:GITHUB_OUTPUT
          }

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze code
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Build Windows Release
        env:
          DANDANPLAY_APP_ID: ${{ secrets.DANDANPLAY_APP_ID }}
          DANDANPLAY_APP_SECRET: ${{ secrets.DANDANPLAY_APP_SECRET }}
        run: |
          flutter build windows --release `
            --dart-define=DANDANPLAY_APP_ID="$env:DANDANPLAY_APP_ID" `
            --dart-define=DANDANPLAY_APP_SECRET="$env:DANDANPLAY_APP_SECRET"

      - name: Package Windows Build
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $sourceDir = "build\windows\x64\runner\Release"
          $outputName = "LinPlayer-Windows-v$version"
          
          # Create zip archive
          Compress-Archive -Path "$sourceDir\*" -DestinationPath "$outputName.zip" -Force
          
          # List contents for debugging
          Write-Host "Package contents:"
          Get-ChildItem "$sourceDir"
          
          Write-Host "Created: $outputName.zip"

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-windows
          path: LinPlayer-Windows-*.zip
          retention-days: 30

      - name: Upload build logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-windows
          path: build/
          retention-days: 3

  # ============================================================
  # 创建预发布版本（聚合所有平台产物）
  # ============================================================
  create-prerelease:
    name: Create Pre-release
    needs: [build-android, build-windows]
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    
    steps:
      - name: Download Android ARM64 APK
        uses: actions/download-artifact@v4
        with:
          name: release-apk-arm64-v8a
          path: ./artifacts/

      - name: Download Android ARMv7 APK
        uses: actions/download-artifact@v4
        with:
          name: release-apk-armeabi-v7a
          path: ./artifacts/

      - name: Download Windows Build
        uses: actions/download-artifact@v4
        with:
          name: release-windows
          path: ./artifacts/

      - name: Determine version
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            echo "version=${{ inputs.version }}" >> $GITHUB_OUTPUT
          else
            PUBSPEC_VER=$(grep '^version:' pubspec.yaml | head -1 | sed 's/version: *//' | cut -d'+' -f1)
            echo "version=${PUBSPEC_VER}-build${{ github.run_number }}" >> $GITHUB_OUTPUT
          fi

      - name: Create Pre-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}-pre
          name: v${{ steps.version.outputs.version }} (Pre-release)
          prerelease: true
          files: ./artifacts/**/*
          generate_release_notes: true

  # 注意：iOS 版本将使用原生 Swift 开发，不包含在此 Flutter 构建中
