name: linplayer_mobile
description: LinPlayer - Emby第三方客户端移动端
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  
  # 状态管理
  flutter_riverpod: ^2.5.1
  
  # 路由
  go_router: ^14.0.0
  
  # 网络
  dio: ^5.4.0
  crypto: ^3.0.3
  
  # 图片加载
  extended_image: ^8.2.0
  http_client_helper: ^3.0.0
  
  # 本地存储
  shared_preferences: ^2.2.2

  # 原生播放器
  # media_kit: 跨平台视频播放器（基于 libmpv 的封装库）
  # 注意：PC 端 PGS/SUP 渲染依赖 libmpv 是否包含 hdmv_pgs_subtitle 解码器；
  #       media-kit 的 Windows 预编译包默认不含该解码器，需额外替换 libmpv-2.dll。
  media_kit: ^1.2.6
  media_kit_video: ^2.0.1
  media_kit_libs_video: ^1.0.7

  # 工具
  path_provider: ^2.1.2
  path: ^1.9.0
  uuid: ^4.3.3
  
  # UI增强
  cupertino_icons: ^1.0.6
  
  # 颜色提取
  palette_generator: ^0.3.3+7

  # 投屏使用纯HTTP扫描（无需原生插件）
  
  # 后台下载
  flutter_downloader: ^1.11.8
  
  # 图片/文件选择
  image_picker: ^1.1.2
  file_picker: ^8.1.7
  
  # XML解析 (DLNA设备描述)
  xml: ^6.5.0

dependency_overrides:
  # 如有需要

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
    - assets/mpv/shaders/


